<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BridgeUp — Find a mentor from your school</title>
  <meta name="description" content="Find a mentor from your school who has walked your path, and send them a message." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <span class="wordmark">BridgeUp</span>
    </header>

    <main style="flex:1; display:flex; flex-direction:column; justify-content:center; padding: var(--space-6) 0;">
      <h1 style="font-size: 32px; letter-spacing:-0.01em;">
        Find a mentor from your school who has walked your path
      </h1>

      <div class="path-rule" aria-hidden="true">
        <span class="dot on"></span>
        <span class="line"></span>
        <span class="dot"></span>
        <span class="line"></span>
        <span class="dot"></span>
      </div>

      <p style="color: var(--color-ink-muted); font-size: 15px; margin-bottom: var(--space-6);">
        No forms to fill out about yourself. Just find someone who's been where you are, and say hello.
      </p>

      <a href="mentors.html" class="btn btn-primary">Find Mentor</a>
    </main>
  </div>
</body>
</html>
