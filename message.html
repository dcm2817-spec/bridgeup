<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Message Mentor — BridgeUp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a href="#" id="back-link" class="back-link" aria-label="Back to profile">&larr; Back</a>
    </header>

    <main style="flex:1;">
      <div id="load-state" class="state-block" role="status">Loading…</div>

      <div id="form-wrap" hidden>
        <h1 style="font-size: 22px; margin-bottom: var(--space-1);">Message <span id="mentor-name"></span></h1>
        <p style="color: var(--color-ink-muted); font-size: 14px; margin-bottom: var(--space-5);">
          Say hello and ask what you actually want to know.
        </p>

        <form id="message-form" novalidate>
          <div class="field">
            <label for="student_name">Your name</label>
            <input type="text" id="student_name" name="student_name" autocomplete="name" required />
            <span class="field-error" id="err-name" hidden>Enter your name.</span>
          </div>

          <div class="field">
            <label for="student_email">Your email</label>
            <input type="email" id="student_email" name="student_email" autocomplete="email" required />
            <span class="field-error" id="err-email" hidden>Enter a valid email.</span>
          </div>

          <div class="field">
            <label for="message">Message</label>
            <textarea id="message" name="message" required placeholder="Tell them a bit about where you're stuck or what you're hoping to learn."></textarea>
            <span class="field-error" id="err-message" hidden>Write a short message.</span>
          </div>

          <button type="submit" class="btn btn-primary" id="submit-btn">Send Message</button>
          <p class="field-error" id="err-general" hidden style="margin-top: var(--space-3); text-align:center;"></p>
        </form>
      </div>

      <div id="success-state" hidden style="text-align:center; padding: var(--space-7) 0;">
        <h1 style="font-size: 22px; margin-bottom: var(--space-2);">Message sent</h1>
        <p style="color: var(--color-ink-muted); font-size: 14px; margin-bottom: var(--space-6);">
          <span id="success-name"></span> will get back to you by email.
        </p>
        <a href="index.html" class="btn btn-secondary">Back to home</a>
      </div>
    </main>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    import { SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY } from "./config.js";

    const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

    const params = new URLSearchParams(window.location.search);
    const mentorId = params.get("id");

    const loadStateEl = document.getElementById("load-state");
    const formWrapEl = document.getElementById("form-wrap");
    const successStateEl = document.getElementById("success-state");
    const formEl = document.getElementById("message-form");
    const submitBtn = document.getElementById("submit-btn");
    const errGeneral = document.getElementById("err-general");

    document.getElementById("back-link").href = mentorId
      ? `mentor.html?id=${encodeURIComponent(mentorId)}`
      : "mentors.html";

    let mentorName = "";

    async function loadMentor() {
      if (!mentorId) {
        loadStateEl.textContent = "No mentor selected.";
        return;
      }

      const { data, error } = await supabase
        .from("mentors")
        .select("id, name")
        .eq("id", mentorId)
        .single();

      if (error || !data) {
        loadStateEl.textContent = "Couldn't find that mentor.";
        return;
      }

      mentorName = data.name;
      document.getElementById("mentor-name").textContent = mentorName;
      document.getElementById("success-name").textContent = mentorName;

      loadStateEl.hidden = true;
      formWrapEl.hidden = false;
    }

    function isValidEmail(value) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
    }

    function setFieldError(id, show) {
      document.getElementById(id).hidden = !show;
    }

    formEl?.addEventListener("submit", async (e) => {
      e.preventDefault();
      errGeneral.hidden = true;

      const studentName = document.getElementById("student_name").value.trim();
      const studentEmail = document.getElementById("student_email").value.trim();
      const message = document.getElementById("message").value.trim();

      let valid = true;
      setFieldError("err-name", studentName.length === 0);
      if (studentName.length === 0) valid = false;

      setFieldError("err-email", !isValidEmail(studentEmail));
      if (!isValidEmail(studentEmail)) valid = false;

      setFieldError("err-message", message.length === 0);
      if (message.length === 0) valid = false;

      if (!valid) return;

      submitBtn.disabled = true;
      submitBtn.textContent = "Sending…";

      const { error } = await supabase.from("messages").insert({
        mentor_id: mentorId,
        student_name: studentName,
        student_email: studentEmail,
        message: message,
      });

      if (error) {
        submitBtn.disabled = false;
        submitBtn.textContent = "Send Message";
        errGeneral.textContent = "Something went wrong sending your message. Please try again.";
        errGeneral.hidden = false;
        return;
      }

      formWrapEl.hidden = true;
      successStateEl.hidden = false;
    });

    loadMentor();
  </script>
</body>
</html>
